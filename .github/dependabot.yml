version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 8
    groups:
      python-dev-tooling:
        patterns:
          - "mypy"
          - "pytest"
          - "ruff"
      python-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - "mypy"
          - "pytest"
          - "ruff"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
