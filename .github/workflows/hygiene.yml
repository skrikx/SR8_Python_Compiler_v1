name: Hygiene

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install repo
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: repo layout check
        run: python scripts/cleanup/check_repo_layout.py

      - name: repo audit
        run: python scripts/cleanup/repo_audit.py --check

      - name: Dry-run stale output pruning
        run: python scripts/cleanup/prune_stale_outputs.py
