name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd frontend
          npm install

      - name: Check frontend
        shell: bash
        run: |
          cd frontend
          npm run check

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm run build
