name: Docs Check

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  docs-check:
    name: docs-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install repo
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run docs contract tests
        run: pytest tests/test_docs_commands.py tests/test_repo_structure.py tests/test_release_workflow_contracts.py
