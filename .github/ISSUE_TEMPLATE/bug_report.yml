name: Bug report
description: Report a reproducible defect in SR8.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Include enough detail for maintainers to reproduce locally.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is failing?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: input
    id: sr8_version
    attributes:
      label: SR8 version
      description: Output from `sr8 version` or package version from `pyproject.toml`.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output from `python --version`.
      placeholder: "3.12.8"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS and relevant local setup details.
      placeholder: Windows 11, local virtualenv, SR8 installed editable.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Exact steps to reproduce.
      placeholder: |
        1. Run ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste relevant terminal output or traceback.
      render: shell
    validations:
      required: false
